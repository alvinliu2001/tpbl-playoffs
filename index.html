<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://tpbl.basketball/favicon.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/alvinliu2001/tpbl-tool/refs/heads/main/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPBL 季後賽晉級預測</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .match-btn { transition: all 0.2s; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#19191a] text-slate-200 p-4 md:p-8">

<div class="max-w-7xl mx-auto">
    <header class="mb-10 text-center">
        <!-- 主標題顏色拆分 -->
        <h1 class="text-3xl md:text-4xl font-extrabold mb-3 tracking-tight">
            <span class="text-[#ffffff]">TPBL 季後賽</span><span class="text-[#d8bf98]">晉級預測工具</span>
        </h1>
        <p class="text-slate-500 font-medium tracking-widest text-sm uppercase">TPBL Playoff Predictor</p>
        
        <!-- 狀態卡片：調整為深色質感 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8">
            <div class="p-5 rounded-2xl bg-[#242426] border border-white/5 shadow-xl">
                <span class="text-emerald-500/80 text-xs font-bold block mb-2 uppercase tracking-tighter">🏆 鎖定前三 (直晉)</span>
                <div id="clinchedTop3" class="text-xl font-black text-emerald-400 drop-shadow-md">-</div>
            </div>
            <div class="p-5 rounded-2xl bg-[#242426] border border-white/5 shadow-xl">
                <span class="text-blue-500/80 text-xs font-bold block mb-2 uppercase tracking-tighter">🎫 鎖定前五 (保底)</span>
                <div id="clinchedTop5" class="text-xl font-black text-blue-400 drop-shadow-md">-</div>
            </div>
            <div class="p-5 rounded-2xl bg-[#242426] border border-white/5 shadow-xl">
                <span class="text-rose-500/80 text-xs font-bold block mb-2 uppercase tracking-tighter">❌ 確定無緣季後賽</span>
                <div id="eliminated" class="text-xl font-black text-rose-400 drop-shadow-md">-</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- 左側：剩餘賽程 -->
        <div class="lg:col-span-5 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col max-h-[800px]">
            <div class="flex justify-between items-center mb-4 shrink-0">
                <h3 class="text-xl font-bold">選擇比賽結果</h3>
                <button onclick="resetAll()" class="text-xs bg-slate-100 hover:bg-slate-200 px-3 py-1 rounded-full transition">重置選擇</button>
            </div>
            <div id="matchList" class="space-y-3 overflow-y-auto custom-scrollbar pr-2 flex-1"></div>
        </div>

        <!-- 右側：戰績排行 -->
        <div class="lg:col-span-7 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-xl font-bold mb-4">目前戰績排名</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 text-xs uppercase">
                                <th class="p-3">排名</th>
                                <th class="p-3">隊伍</th>
                                <th class="p-3 text-center">總戰績</th>
                                <th class="p-3 text-center">最高勝場</th>
                                <th class="p-3 text-center">狀態</th>
                            </tr>
                        </thead>
                        <tbody id="standingsBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase">勝場分佈視覺化</h3>
                <div class="h-[300px]">
                    <canvas id="standingsChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. 各隊官方色號與特定文字色設定
    const baseTeams = {
        '雲豹':   { win: 19, lose: 9,  color: '#116d4e', textColor: '#ffffff' },
        '夢想家': { win: 17, lose: 11, color: '#8eb73d', textColor: '#ffffff' },
        '國王':   { win: 15, lose: 13, color: '#ffe91a', textColor: '#000000' },
        '攻城獅': { win: 14, lose: 12, color: '#52308c', textColor: '#ffffff' }, // 修正：從 14L 改為 12L
        '特攻':   { win: 14, lose: 13, color: '#f6d233', textColor: '#182648' }, // 已賽 27 場
        '戰神':   { win: 9,  lose: 18, color: '#e20202', textColor: '#ffffff' }, // 已賽 27 場
        '海神':   { win: 8,  lose: 20, color: '#0766e3', textColor: '#ffffff' }
    };

    const initialH2H = {
        '雲豹': { '夢想家': 3, '攻城獅': 2, '國王': 3, '特攻': 4, '戰神': 4, '海神': 3 },
        '夢想家': { '雲豹': 2, '攻城獅': 2, '國王': 1, '特攻': 3, '戰神': 5, '海神': 4 },
        '攻城獅': { '雲豹': 2, '夢想家': 2, '國王': 3, '特攻': 2, '戰神': 1, '海神': 4 },
        '國王': { '雲豹': 2, '夢想家': 3, '攻城獅': 2, '特攻': 1, '戰神': 3, '海神': 4 },
        '特攻': { '雲豹': 1, '夢想家': 2, '攻城獅': 2, '國王': 3, '戰神': 3, '海神': 3 },
        '戰神': { '雲豹': 1, '夢想家': 0, '攻城獅': 3, '國王': 2, '特攻': 1, '海神': 2 },
        '海神': { '雲豹': 1, '夢想家': 1, '攻城獅': 1, '國王': 1, '特攻': 2, '戰神': 2 }
    };

    const matches = [
        { id: 'G97', date: '3/25', teamA: '夢想家', teamB: '海神' },
        { id: 'G98', date: '3/27', teamA: '夢想家', teamB: '國王' },
        { id: 'G99', date: '3/28', teamA: '攻城獅', teamB: '特攻' },
        { id: 'G100', date: '3/28', teamA: '戰神', teamB: '海神' },
        { id: 'G101', date: '3/29', teamA: '攻城獅', teamB: '雲豹' },
        { id: 'G102', date: '3/29', teamA: '戰神', teamB: '國王' },
        { id: 'G103', date: '4/1',  teamA: '特攻', teamB: '戰神' },
        { id: 'G104', date: '4/4',  teamA: '特攻', teamB: '夢想家' },
        { id: 'G105', date: '4/4',  teamA: '雲豹', teamB: '海神' },
        { id: 'G106', date: '4/5',  teamA: '特攻', teamB: '國王' },
        { id: 'G107', date: '4/5',  teamA: '雲豹', teamB: '戰神' },  
        { id: 'G108', date: '4/8',  teamA: '攻城獅', teamB: '特攻' },
        { id: 'G109', date: '4/11', teamA: '海神', teamB: '國王' },
        { id: 'G110', date: '4/11', teamA: '攻城獅', teamB: '雲豹' },
        { id: 'G111', date: '4/12', teamA: '海神', teamB: '戰神' },
        { id: 'G112', date: '4/12', teamA: '攻城獅', teamB: '夢想家' },
        { id: 'G113', date: '4/18', teamA: '夢想家', teamB: '戰神' },
        { id: 'G114', date: '4/18', teamA: '特攻', teamB: '雲豹' },
        { id: 'G115', date: '4/19', teamA: '夢想家', teamB: '攻城獅' },
        { id: 'G116', date: '4/19', teamA: '特攻', teamB: '海神' },
        { id: 'G117', date: '4/24', teamA: '國王', teamB: '夢想家' },
        { id: 'G118', date: '4/25', teamA: '雲豹', teamB: '海神' },
        { id: 'G119', date: '4/25', teamA: '戰神', teamB: '攻城獅' },
        { id: 'G120', date: '4/26', teamA: '雲豹', teamB: '夢想家' },
        { id: 'G121', date: '4/26', teamA: '戰神', teamB: '特攻' },
        { id: 'G122', date: '4/29', teamA: '攻城獅', teamB: '國王' },
        { id: 'G123', date: '5/2',  teamA: '攻城獅', teamB: '戰神' },
        { id: 'G124', date: '5/2',  teamA: '國王', teamB: '雲豹' },
        { id: 'G125', date: '5/3',  teamA: '攻城獅', teamB: '海神' },
        { id: 'G126', date: '5/3',  teamA: '國王', teamB: '特攻' }
    ];

    let matchResults = {};
    let chartInstance = null;

    function init() {
        matches.forEach(m => matchResults[m.id] = null);
        renderMatches();
        calculateAndUpdate();
    }

    function renderMatches() {
        const container = document.getElementById('matchList');
        container.innerHTML = matches.map(m => {
            const res = matchResults[m.id];
            const styleA = getTeamStyle(m.teamA, res === 'teamA');
            const styleB = getTeamStyle(m.teamB, res === 'teamB');

            return `
                <div class="p-4 rounded-2xl bg-[#242426] border border-white/5 shadow-sm mb-3">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-[11px] font-bold text-slate-500 bg-white/5 px-2 py-0.5 rounded tracking-widest">${m.id} | ${m.date}</span>
                    </div>
                    <div class="flex space-x-3 relative">
                        <div class="flex-1 flex flex-col">
                            <button onclick="setWinner('${m.id}', 'teamA')" 
                                style="${styleA}"
                                class="py-3 text-sm rounded-xl border transition-all font-bold ${res === 'teamA' ? 'shadow-[0_0_15px_rgba(0,0,0,0.4)] scale-[1.03]' : 'bg-[#19191a] text-slate-400 border-white/10 hover:border-white/20'}">
                                ${m.teamA}
                            </button>
                            <span class="text-[9px] text-center text-slate-600 mt-2 font-bold uppercase tracking-widest">Home</span>
                        </div>
                        <div class="flex items-center text-white/10 font-black text-xs">VS</div>
                        <div class="flex-1 flex flex-col">
                            <button onclick="setWinner('${m.id}', 'teamB')" 
                                style="${styleB}"
                                class="py-3 text-sm rounded-xl border transition-all font-bold ${res === 'teamB' ? 'shadow-[0_0_15px_rgba(0,0,0,0.4)] scale-[1.03]' : 'bg-[#19191a] text-slate-400 border-white/10 hover:border-white/20'}">
                                ${m.teamB}
                            </button>
                            <span class="text-[9px] text-center text-slate-600 mt-2 font-bold uppercase tracking-widest">Away</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 封裝樣式獲取邏輯
    function getTeamStyle(teamName, isSelected) {
        if (!isSelected) return "";
        const team = baseTeams[teamName];
        return `background-color: ${team.color}; color: ${team.textColor}; border-color: ${team.color};`;
    }

    function setWinner(id, winner) {
        matchResults[id] = (matchResults[id] === winner) ? null : winner;
        renderMatches();
        calculateAndUpdate();
    }

    function resetAll() {
        matches.forEach(m => matchResults[m.id] = null);
        renderMatches();
        calculateAndUpdate();
    }

    function compareTwoTeams(teamA, teamB, stats, h2h) {
        if (stats[teamA].win !== stats[teamB].win) return stats[teamA].win - stats[teamB].win;
        return (h2h[teamA][teamB] || 0) - (h2h[teamB][teamA] || 0);
    }

    function canTargetBeatOther(target, other, stats, h2h) {
        const targetMax = stats[target].maxWins;
        const otherMin = stats[other].win;
        if (targetMax > otherMin) return true;
        if (targetMax < otherMin) return false;
        return (h2h[target][other] || 0) >= (h2h[other][target] || 0);
    }

    function calculateAndUpdate() {
        let currentStats = JSON.parse(JSON.stringify(baseTeams));
        let currentH2H = JSON.parse(JSON.stringify(initialH2H));

        matches.forEach(m => {
            const res = matchResults[m.id];
            if (res) {
                const winner = res === 'teamA' ? m.teamA : m.teamB;
                const loser = res === 'teamA' ? m.teamB : m.teamA;
                currentStats[winner].win++;
                currentStats[loser].lose++;
                currentH2H[winner][loser] = (currentH2H[winner][loser] || 0) + 1;
            }
        });

        Object.keys(currentStats).forEach(t => currentStats[t].maxWins = 36 - currentStats[t].lose);

        const teams = Object.keys(currentStats);
        let clinchedTop3 = [], clinchedTop5 = [], eliminated = [];

        teams.forEach(target => {
            let canBeBeatenBy = 0, definitelyBeatenBy = 0;
            teams.forEach(other => {
                if (target === other) return;
                if (canTargetBeatOther(other, target, currentStats, currentH2H)) canBeBeatenBy++;
                if (!canTargetBeatOther(target, other, currentStats, currentH2H)) definitelyBeatenBy++;
            });
            if (canBeBeatenBy < 3) clinchedTop3.push(target);
            else if (canBeBeatenBy < 5) clinchedTop5.push(target);
            if (definitelyBeatenBy >= 5) eliminated.push(target);
        });

        document.getElementById('clinchedTop3').innerText = clinchedTop3.length ? clinchedTop3.join(', ') : '尚未鎖定';
        document.getElementById('clinchedTop5').innerText = clinchedTop5.length ? clinchedTop5.join(', ') : '尚未鎖定';
        document.getElementById('eliminated').innerText = eliminated.length ? eliminated.join(', ') : '尚未產生';

        const sorted = teams.sort((a, b) => compareTwoTeams(b, a, currentStats, currentH2H));
        renderTable(sorted, currentStats, clinchedTop3, clinchedTop5, eliminated);
        renderChart(sorted, currentStats);
    }

    function renderTable(sorted, stats, top3, top5, elim) {
        const body = document.getElementById('standingsBody');
        body.innerHTML = sorted.map((team, i) => {
            let status = '<span class="text-white/10">-</span>';
            if (top3.includes(team)) status = '<span class="text-emerald-400 font-bold text-[10px] bg-emerald-500/10 border border-emerald-500/20 px-2 py-1 rounded-full uppercase">Clinched Top3</span>';
            else if (top5.includes(team)) status = '<span class="text-blue-400 font-bold text-[10px] bg-blue-500/10 border border-blue-500/20 px-2 py-1 rounded-full uppercase">Clinched Top5</span>';
            else if (elim.includes(team)) status = '<span class="text-rose-400 font-bold text-[10px] bg-rose-500/10 border border-rose-500/20 px-2 py-1 rounded-full uppercase">Eliminated</span>';

            return `
                <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                    <td class="p-4 font-mono font-bold text-slate-600">#0${i+1}</td>
                    <td class="p-4 flex items-center">
                        <span class="w-2 h-2 rounded-full mr-3 shadow-sm" style="background-color: ${baseTeams[team].color}"></span>
                        <span class="font-bold text-slate-200">${team}</span>
                    </td>
                    <td class="p-4 text-center text-sm font-medium text-slate-400">${stats[team].win}W - ${stats[team].lose}L</td>
                    <td class="p-4 text-center font-black text-[#d8bf98] text-lg">${stats[team].maxWins}</td>
                    <td class="p-4 text-right">${status}</td>
                </tr>
            `;
        }).join('');
    }

    function renderChart(sorted, stats) {
        const ctx = document.getElementById('standingsChart').getContext('2d');
        const data = {
            labels: sorted,
            datasets: [
                { label: '目前勝場', data: sorted.map(t => stats[t].win), backgroundColor: sorted.map(t => baseTeams[t].color), borderRadius: 6 },
                { label: '潛在勝場', data: sorted.map(t => stats[t].maxWins - stats[t].win), backgroundColor: 'rgba(255, 255, 255, 0.05)', borderRadius: 6 }
            ]
        };

        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: data,
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    x: { stacked: true, max: 36, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }, 
                    y: { stacked: true, grid: { display: false }, ticks: { color: '#cbd5e1', font: { weight: 'bold' } } } 
                },
                plugins: { 
                    legend: { display: false },
                    tooltip: { backgroundColor: '#242426', titleColor: '#fff', bodyColor: '#cbd5e1', cornerRadius: 8 }
                }
            }
        });
    }

    window.onload = init;
</script>
</body>
</html>
