<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://tpbl.basketball/favicon.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/alvinliu2001/tpbl-playoffs/refs/heads/main/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPBL 季後賽晉級預測</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        .match-btn { transition: all 0.2s; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .tooltip-content { transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
        .group:hover .tooltip-content { opacity: 1; transform: translateY(0); }
        @media (min-width: 1024px) { .desktop-container { height: calc(100vh - 4rem); position: sticky; top: 2rem; } }
        @media (max-width: 1023px) { .mobile-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; } .mobile-slider::-webkit-scrollbar { display: none; } .slide-item { flex: 0 0 100%; scroll-snap-align: center; padding: 0 4px; } }
    </style>
</head>
<body class="bg-[#19191a] text-slate-200 p-3 md:p-8">

<div class="max-w-7xl mx-auto text-shadow-sm">
    <header class="mb-8 md:mb-10 text-center">
        <h1 class="text-2xl md:text-4xl font-extrabold mb-3 tracking-tight">
            <span class="text-[#ffffff]">TPBL 季後賽</span><span class="text-[#d8bf98]">晉級預測工具</span>
        </h1>
        <p class="text-slate-500 font-medium tracking-widest text-xs md:sm uppercase">TPBL Playoff Predictor</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4 mt-8">
            <div class="p-4 md:p-5 rounded-2xl bg-[#242426] border border-white/5 shadow-xl text-center">
                <span class="text-emerald-500/80 text-[10px] md:text-xs font-bold block mb-2 uppercase tracking-tighter">🏆 確定進入季後賽</span>
                <div id="clinchedTop3" class="text-lg md:text-xl font-black text-emerald-400 drop-shadow-md">未有隊伍</div>
            </div>
            <div class="p-4 md:p-5 rounded-2xl bg-[#242426] border border-white/5 shadow-xl text-center">
                <span class="text-blue-500/80 text-[10px] md:text-xs font-bold block mb-2 uppercase tracking-tighter">🎫 至少進入挑戰賽</span>
                <div id="clinchedTop5" class="text-lg md:text-xl font-black text-blue-400 drop-shadow-md">未有隊伍</div>
            </div>
            <div class="p-4 md:p-5 rounded-2xl bg-[#242426] border border-white/5 shadow-xl text-center text-rose-400">
                <span class="text-rose-500/80 text-[10px] md:text-xs font-bold block mb-2 uppercase tracking-tighter">❌ 無法進入季後賽</span>
                <div id="eliminated" class="text-lg md:text-xl font-black drop-shadow-md">未有隊伍</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8 items-start">
        <div class="lg:col-span-5 desktop-container text-shadow-none">
            <div class="bg-[#242426] p-4 md:p-6 rounded-2xl shadow-sm border border-white/5 flex flex-col h-full">
                <div class="flex justify-between items-center mb-5 shrink-0 px-1">
                    <h3 class="text-lg md:text-xl font-bold text-white flex items-center">
                        <span class="w-1 h-5 bg-[#d8bf98] mr-3 rounded-full"></span>預測比賽結果
                    </h3>
                    <div class="flex items-center space-x-3">
                        <span class="lg:hidden text-[10px] text-[#d8bf98]/50 font-bold uppercase tracking-widest animate-pulse">Swipe ↔</span>
                        <button onclick="resetAll()" class="text-[10px] font-bold bg-white/5 hover:bg-white/10 text-slate-300 px-3 py-1.5 rounded-full transition border border-white/10 uppercase tracking-wider">Reset</button>
                    </div>
                </div>
                <div id="matchList" class="mobile-slider lg:flex-col lg:overflow-y-auto custom-scrollbar flex-1 lg:space-y-3 pb-2 md:pb-0"></div>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div class="bg-[#242426] p-4 md:p-6 rounded-2xl shadow-sm border border-white/5 text-slate-200">
                <h3 class="text-lg md:text-xl font-bold mb-5 text-white flex items-center">
                    <span class="w-1 h-5 bg-[#d8bf98] mr-3 rounded-full"></span>模擬戰績排名
                </h3>
                <div class="overflow-visible px-0"> 
                    <table class="w-full text-left border-collapse table-fixed">
                        <thead>
                            <tr class="text-slate-500 text-[9px] md:text-[11px] uppercase tracking-widest border-b border-white/5">
                                <th class="pb-4 pl-4 w-[12%]">名次</th>
                                <th class="pb-4 w-[25%]">隊伍</th>
                                <th class="pb-4 text-center w-[18%] relative group cursor-help">
                                    <span class="border-b border-dotted border-slate-600 font-bold">現時戰績</span>
                                    <div class="tooltip-content absolute z-20 invisible group-hover:visible opacity-0 -translate-y-1 w-32 md:w-40 p-2 mt-2 text-[10px] leading-relaxed text-slate-200 bg-[#1d1d1f] border border-[#d8bf98]/30 rounded-lg shadow-2xl left-1/2 -translate-x-1/2 normal-case font-medium tracking-normal text-shadow-none font-bold">包含目前已點選的預測賽果。</div>
                                </th>
                                <th class="pb-4 text-center text-[#d8bf98] w-[15%] relative group cursor-help">
                                    <span class="border-b border-dotted border-[#d8bf98]/50 font-bold">最高勝場</span>
                                    <div class="tooltip-content absolute z-20 invisible group-hover:visible opacity-0 -translate-y-1 w-32 md:w-40 p-2 mt-2 text-[10px] leading-relaxed text-slate-200 bg-[#1d1d1f] border border-[#d8bf98]/30 rounded-lg shadow-2xl left-1/2 -translate-x-1/2 normal-case font-medium tracking-normal text-shadow-none font-bold">若剩餘全勝，本季最終能達到的最高總勝場。</div>
                                </th>
                                <th class="pb-4 text-center w-[15%] relative group cursor-help">
                                    <span class="border-b border-dotted border-slate-600 font-bold">晉級場數</span>
                                    <div class="tooltip-content absolute z-20 invisible group-hover:visible opacity-0 -translate-y-1 w-32 md:w-40 p-2 mt-2 text-[10px] leading-relaxed text-slate-200 bg-[#1d1d1f] border border-[#d8bf98]/30 rounded-lg shadow-2xl left-1/2 -translate-x-1/2 normal-case font-medium tracking-normal text-center text-shadow-none font-bold">在理想劇本下，預計還需幾場聯賽即可鎖定前三。</div>
                                </th>
                                <th class="pb-4 text-right pr-4 w-[17%]">狀態</th>
                            </tr>
                        </thead>
                        <tbody id="standingsBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="pathAnalysisSection" class="bg-[#242426] p-4 md:p-6 rounded-2xl shadow-sm border border-white/5 hidden">
                <h3 class="text-lg md:text-xl font-bold mb-5 text-white flex items-center justify-between">
                    <div class="flex items-center"><span class="w-1 h-5 bg-[#d8bf98] mr-3 rounded-full"></span>最短晉級路徑分析</div>
                    <div id="pathTeamName" class="text-[10px] md:text-sm font-bold text-[#d8bf98] bg-[#d8bf98]/10 px-3 py-1 rounded-full border border-[#d8bf98]/20 tracking-wide"></div>
                </h3>
                <div id="pathList" class="grid grid-cols-1 md:grid-cols-2 gap-2 md:gap-3 text-sm"></div>
                <div class="mt-4 p-3 md:p-4 bg-white/[0.02] rounded-xl border border-white/5 text-[9px] md:text-[10px] text-slate-500 leading-relaxed font-medium text-center italic">
                    * 註：此路徑為系統推論之「理想劇本」，僅供參考。
                </div>
            </div>

            <div class="bg-[#242426] p-4 md:p-6 rounded-2xl shadow-sm border border-white/5 text-center text-shadow-none font-bold">
                <h3 class="text-[11px] font-bold text-slate-500 mb-6 uppercase tracking-widest text-center">各隊勝場區間視覺化</h3>
                <div class="h-[280px] md:h-[320px]"><canvas id="standingsChart"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script>
    // 同步至 4/12 賽後基準數據
    const baseTeams = {
        '雲豹':   { win: 21, lose: 11, color: '#116d4e', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/leopards.BGzlSG8M.webp' },
        '夢想家': { win: 20, lose: 12, color: '#8eb73d', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/dreamers.8uP5AliT.webp' },
        '攻城獅': { win: 18, lose: 13, color: '#52308c', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/lioneers.DTfkuEJZ.webp' },
        '國王':   { win: 17, lose: 15, color: '#ffe91a', textColor: '#000000', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/kings.DsunMN-K.webp' },
        '特攻':   { win: 16, lose: 16, color: '#f6d233', textColor: '#182648', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/dea.BEfNfG39.webp' },
        '戰神':   { win: 11, lose: 21, color: '#e20202', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/mars.BbDWfkG6.webp' },
        '海神':   { win: 9,  lose: 24, color: '#0766e3', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/aquas.CB-Rq9NB.webp' }
    };

    const initialH2H = {
        '雲豹': { '夢想家': 3, '攻城獅': 2, '國王': 3, '特攻': 4, '戰神': 5, '海神': 4 },
        '夢想家': { '雲豹': 2, '攻城獅': 3, '國王': 2, '特攻': 3, '戰神': 5, '海神': 5 },
        '攻城獅': { '雲豹': 4, '夢想家': 2, '國王': 3, '特攻': 4, '戰神': 3, '海神': 4 },
        '國王': { '雲豹': 2, '夢想家': 3, '攻城獅': 2, '特攻': 1, '戰神': 4, '海神': 5 },
        '特攻': { '雲豹': 1, '夢想家': 3, '攻城獅': 2, '國王': 4, '戰神': 3, '海神': 3 },
        '戰神': { '雲豹': 1, '夢想家': 0, '攻城獅': 1, '國王': 2, '特攻': 2, '海神': 3 },
        '海神': { '雲豹': 1, '夢想家': 1, '攻城獅': 1, '國王': 1, '特攻': 2, '戰神': 3 }
    };

    // 剩餘賽程 (從 4/18 開始)
    const matches = [
        { id: 'G113', date: '4/18', teamA: '夢想家', teamB: '戰神' }, { id: 'G114', date: '4/18', teamA: '特攻', teamB: '雲豹' },
        { id: 'G115', date: '4/19', teamA: '夢想家', teamB: '攻城獅' }, { id: 'G116', date: '4/19', teamA: '特攻', teamB: '海神' },
        { id: 'G117', date: '4/24', teamA: '國王', teamB: '夢想家' }, { id: 'G118', date: '4/25', teamA: '雲豹', teamB: '海神' },
        { id: 'G119', date: '4/25', teamA: '戰神', teamB: '攻城獅' }, { id: 'G120', date: '4/26', teamA: '雲豹', teamB: '夢想家' },
        { id: 'G121', date: '4/26', teamA: '戰神', teamB: '特攻' }, { id: 'G122', date: '4/29', teamA: '攻城獅', teamB: '國王' },
        { id: 'G123', date: '5/2',  teamA: '攻城獅', teamB: '戰神' }, { id: 'G124', date: '5/2',  teamA: '國王', teamB: '雲豹' },
        { id: 'G125', date: '5/3',  teamA: '攻城獅', teamB: '海神' }, { id: 'G126', date: '5/3',  teamA: '國王', teamB: '特攻' }
    ];

    let matchResults = {}, chartInstance = null, selectedPathTeam = '雲豹';
    const STORAGE_KEY = 'tpbl_sim_final_0412';

    function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) matchResults = JSON.parse(saved);
        else matches.forEach(m => matchResults[m.id] = null);
        renderMatches(); calculateAndUpdate();
    }

    function resetAll() {
        matches.forEach(m => matchResults[m.id] = null);
        localStorage.removeItem(STORAGE_KEY);
        renderMatches(); calculateAndUpdate();
    }

    function renderMatches() {
        const container = document.getElementById('matchList');
        container.innerHTML = matches.map(m => {
            const res = matchResults[m.id];
            return `<div class="slide-item"><div class="p-4 rounded-xl bg-[#1d1d1f] border border-white/5 shadow-sm h-full flex flex-col justify-center text-shadow-none"><div class="flex items-center justify-between mb-4 px-1"><span class="text-[10px] font-bold text-slate-200 bg-white/10 px-2 py-0.5 rounded tracking-widest">${m.id} | ${m.date}</span><span class="text-[9px] text-slate-500 uppercase font-black tracking-tighter">Select Result</span></div><div class="flex space-x-2 items-center"><div class="flex-1"><button onclick="setWinner('${m.id}', 'teamB')" style="${getTeamStyle(m.teamB, res === 'teamB')}" class="w-full py-3 px-2 text-[13px] md:text-sm rounded-lg border transition-all font-bold text-center truncate ${res === 'teamB' ? 'shadow-[0_0_15px_rgba(0,0,0,0.3)]' : 'bg-[#242426] text-slate-300 border-white/5 hover:border-white/10'}">${m.teamB}</button><div class="text-[8px] text-center text-slate-600 mt-1 font-black uppercase tracking-widest">Away</div></div><div class="text-white/10 font-black text-[9px] italic uppercase px-1">vs</div><div class="flex-1"><button onclick="setWinner('${m.id}', 'teamA')" style="${getTeamStyle(m.teamA, res === 'teamA')}" class="w-full py-3 px-2 text-[13px] md:text-sm rounded-lg border transition-all font-bold text-center truncate ${res === 'teamA' ? 'shadow-[0_0_15px_rgba(0,0,0,0.3)]' : 'bg-[#242426] text-slate-300 border-white/5 hover:border-white/10'}">${m.teamA}</button><div class="text-[8px] text-center text-slate-600 mt-1 font-black uppercase tracking-widest">Home</div></div></div></div></div>`;
        }).join('');
    }

    function getTeamStyle(name, sel) { const t = baseTeams[name]; return sel ? `background-color: ${t.color}; color: ${t.textColor}; border-color: ${t.color};` : ""; }
    function selectPathTeam(name) { selectedPathTeam = name; calculateAndUpdate(); }
    function setWinner(id, winner) { matchResults[id] = (matchResults[id] === winner) ? null : winner; localStorage.setItem(STORAGE_KEY, JSON.stringify(matchResults)); renderMatches(); calculateAndUpdate(); }

    function sortRanking(stats, h2h) {
        const list = Object.keys(stats);
        return list.sort((a, b) => {
            const sA = stats[a], sB = stats[b];
            const pctA = sA.win / (sA.win + sA.lose || 1), pctB = sB.win / (sB.win + sB.lose || 1);
            if (Math.abs(pctA - pctB) > 0.0001) return pctB - pctA;
            const tied = list.filter(t => Math.abs(stats[t].win / (stats[t].win + stats[t].lose || 1) - pctA) < 0.0001);
            if (tied.length > 2) { const getGW = (tm) => tied.reduce((sum, o) => (tm === o) ? sum : sum + (h2h[tm][o] || 0), 0); if (getGW(a) !== getGW(b)) return getGW(b) - getGW(a); }
            return (h2h[b][a] || 0) - (h2h[a][b] || 0);
        });
    }

    function checkClinchStatus(targetTeam, stats, h2h) {
        let risk = 0;
        Object.keys(stats).forEach(o => { if (o !== targetTeam && (stats[o].maxWins > stats[targetTeam].win || (stats[o].maxWins === stats[targetTeam].win && (h2h[targetTeam][o] || 0) < 4))) risk++; });
        return risk < 3;
    }

    function getQuickestClinch(targetTeam, currentStats, currentH2H) {
        const runSim = (st, hh, res) => {
            let s = JSON.parse(JSON.stringify(st)), h = JSON.parse(JSON.stringify(hh));
            if (checkClinchStatus(targetTeam, s, h)) return 0;
            let count = 0;
            for (let i = 0; i < matches.length; i++) {
                const m = matches[i]; if (res[m.id] !== null) continue;
                count++;
                let w = (m.teamA === targetTeam || m.teamB === targetTeam) ? targetTeam : (s[m.teamA].lose <= s[m.teamB].lose ? m.teamB : m.teamA);
                let l = (m.teamA === w) ? m.teamB : m.teamA;
                s[w].win++; s[l].lose++; h[w][l]++; s[w].maxWins = 36-s[w].lose; s[l].maxWins = 36-s[l].lose;
                if (checkClinchStatus(targetTeam, s, h)) return count;
            }
            return 999;
        };
        let minD = runSim(currentStats, currentH2H, matchResults);
        if (minD === 0) return { days: 0, path: [] };
        if (minD >= 999) return { days: 'X', path: [] };
        let path = [], s = JSON.parse(JSON.stringify(currentStats)), h = JSON.parse(JSON.stringify(currentH2H)), r = JSON.parse(JSON.stringify(matchResults)), found = false;
        for (let i = 0; i < matches.length; i++) {
            const m = matches[i]; if (r[m.id] !== null) continue;
            let wT = (m.teamA === targetTeam || m.teamB === targetTeam) ? targetTeam : (s[m.teamA].lose <= s[m.teamB].lose ? m.teamB : m.teamA);
            let lT = (m.teamA === wT) ? m.teamB : m.teamA;
            path.push({ id: m.id, date: m.date, detail: (wT === targetTeam) ? `<span class="text-[#d8bf98] font-bold">${targetTeam}</span> 獲勝` : `${lT} 輸給 ${wT}` });
            s[wT].win++; s[lT].lose++; h[wT][lT]++; s[wT].maxWins = 36-s[wT].lose; s[lT].maxWins = 36-s[lT].lose; r[m.id] = 'sim';
            if (checkClinchStatus(targetTeam, s, h)) { found = true; break; }
        }
        return found ? { days: path.length, path: path } : { days: 'X', path: [] };
    }

    function calculateAndUpdate() {
        let stats = JSON.parse(JSON.stringify(baseTeams)), h2h = JSON.parse(JSON.stringify(initialH2H));
        matches.forEach(m => { const res = matchResults[m.id]; if (res) { const win = res === 'teamA' ? m.teamA : m.teamB, los = res === 'teamA' ? m.teamB : m.teamA; stats[win].win++; stats[los].lose++; h2h[win][los]++; } });
        Object.keys(stats).forEach(t => stats[t].maxWins = 36 - stats[t].lose);
        const teams = Object.keys(stats);
        let t3 = [], t5 = [], elim = [], info = {};
        teams.forEach(t => {
            let r3 = 0, r5 = 0;
            teams.forEach(o => { if (t === o) return; if (stats[o].maxWins > stats[t].win || (stats[o].maxWins === stats[t].win && (h2h[t][o] || 0) < 4)) r3++; if (stats[o].maxWins > stats[t].win || (stats[o].maxWins === stats[t].win && (h2h[t][o] || 0) < 4)) r5++; });
            if (r3 < 3) t3.push(t); if (r5 < 5) t5.push(t);
            info[t] = getQuickestClinch(t, stats, h2h);
        });
        teams.forEach(t => {
            let defAbove = 0;
            teams.forEach(o => { if (t !== o && (stats[o].win > stats[t].maxWins || (stats[o].win === stats[t].maxWins && (h2h[o][t] || 0) >= 4))) defAbove++; });
            if (defAbove >= 5) elim.push(t);
        });
        document.getElementById('clinchedTop3').innerText = t3.length ? t3.join(', ') : '未有隊伍';
        document.getElementById('clinchedTop5').innerText = t5.filter(x => !t3.includes(x)).length ? t5.filter(x => !t3.includes(x)).join(', ') : '未有隊伍';
        document.getElementById('eliminated').innerText = elim.length ? elim.join(', ') : '未有隊伍';
        const sorted = sortRanking(stats, h2h);
        document.getElementById('standingsBody').innerHTML = sorted.map((t, i) => {
            let s = '<span class="text-white/5">-</span>';
            if (t3.includes(t)) s = '<span class="text-emerald-400 font-bold text-[7px] md:text-[10px] bg-emerald-500/10 border border-emerald-500/30 px-1 md:px-3 py-1 rounded-full tracking-tighter">PLAYOFFS</span>';
            else if (t5.includes(t)) s = '<span class="text-blue-400 font-bold text-[7px] md:text-[10px] bg-blue-500/10 border border-blue-500/30 px-1 md:px-3 py-1 rounded-full tracking-tighter">PLAY-IN</span>';
            else if (elim.includes(t)) s = '<span class="text-rose-400 font-bold text-[7px] md:text-[10px] bg-rose-500/10 border border-rose-500/30 px-1 md:px-3 py-1 rounded-full tracking-tighter uppercase font-black">ELIM</span>';
            const d = info[t].days, disp = (d === 0) ? '達成' : (d === 'X' ? '⨉' : d), sel = t === selectedPathTeam;
            return `<tr onclick="selectPathTeam('${t}')" class="border-b border-white/5 hover:bg-white/[0.05] transition-all cursor-pointer group ${sel ? 'bg-[#d8bf98]/5 ring-1 ring-inset ring-[#d8bf98]/40' : ''}"><td class="py-5 pl-4 font-mono font-bold ${sel ? 'text-[#d8bf98]' : 'text-slate-500'} text-[11px] md:text-sm">0${i+1}</td><td class="py-5"><div class="flex items-center whitespace-nowrap"><div class="relative w-6 h-6 md:w-9 md:h-9 mr-2 md:mr-4 bg-[#19191a] rounded-lg p-1 border border-white/10"><img src="${baseTeams[t].logo}" class="w-full h-full object-contain"></div><span class="font-bold ${sel ? 'text-white' : 'text-slate-100'} text-[13px] md:text-base tracking-tighter">${t}</span></div></td><td class="py-5 text-center text-[10px] md:text-sm font-semibold text-slate-400">${stats[t].win}-${stats[t].lose}</td><td class="py-5 text-center font-black text-[#d8bf98] text-[13px] md:text-xl tabular-nums">${stats[t].maxWins}</td><td class="py-5 text-center font-bold ${sel ? 'text-[#d8bf98]' : 'text-slate-400'} text-[11px] md:text-base">${disp}</td><td class="py-5 text-right pr-4">${s}</td></tr>`;
        }).join('');
        const pData = info[selectedPathTeam], list = document.getElementById('pathList');
        document.getElementById('pathAnalysisSection').classList.remove('hidden'); document.getElementById('pathTeamName').innerText = `${selectedPathTeam} 最短晉級路徑`;
        if (pData.days === 0) list.innerHTML = `<div class="col-span-full py-8 text-center bg-white/5 rounded-2xl border border-white/5 text-shadow-none"><div class="text-[#d8bf98] font-bold text-sm">已達成晉級條件</div></div>`;
        else if (pData.days === 'X') list.innerHTML = `<div class="col-span-full py-8 text-center bg-white/5 rounded-2xl border border-white/5 text-shadow-none"><div class="text-slate-400 font-bold text-sm">無直接晉級路徑</div></div>`;
        else list.innerHTML = pData.path.map(item => `<div class="flex items-center p-3 bg-white/5 rounded-xl border border-white/5 transition-all group text-shadow-none"><div class="mr-3 text-[9px] font-mono text-slate-500 leading-tight">${item.date}<br/><span class="text-slate-400 font-bold">${item.id}</span></div><div class="text-slate-200 font-medium text-[11px] md:text-xs">${item.detail}</div></div>`).join('');
        const ctx = document.getElementById('standingsChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, { type: 'bar', data: { labels: sorted, datasets: [{ label: '目前勝場', data: sorted.map(t => stats[t].win), backgroundColor: sorted.map(t => baseTeams[t].color), borderRadius: 6 }, { label: '潛在勝場', data: sorted.map(t => stats[t].maxWins - stats[t].win), backgroundColor: 'rgba(255, 255, 255, 0.05)', borderRadius: 6 }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true, max: 36, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#475569', font: { size: 9 } } }, y: { stacked: true, grid: { display: false }, ticks: { color: '#cbd5e1', font: { weight: 'bold', size: 11 } } } }, plugins: { legend: { display: false } } } });
    }
    window.onload = init;
</script>
</body>
</html>
