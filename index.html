<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://tpbl.basketball/favicon.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/alvinliu2001/tpbl-tool/refs/heads/main/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPBL 季後賽晉級預測</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .match-btn { transition: all 0.2s; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>
<body class="bg-[#19191a] text-slate-200 p-4 md:p-8">

<div class="max-w-7xl mx-auto">
    <header class="mb-10 text-center">
        <h1 class="text-3xl md:text-4xl font-extrabold mb-3 tracking-tight">
            <span class="text-[#ffffff]">TPBL 季後賽</span><span class="text-[#d8bf98]">晉級預測工具</span>
        </h1>
        <p class="text-slate-500 font-medium tracking-widest text-sm uppercase">TPBL Playoff Predictor</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8">
            <div class="p-5 rounded-2xl bg-[#242426] border border-white/5 shadow-xl text-center">
                <span class="text-emerald-500/80 text-xs font-bold block mb-2 uppercase tracking-tighter">🏆 確定進入季後賽</span>
                <div id="clinchedTop3" class="text-xl font-black text-emerald-400 drop-shadow-md">未有隊伍</div>
            </div>
            <div class="p-5 rounded-2xl bg-[#242426] border border-white/5 shadow-xl text-center">
                <span class="text-blue-500/80 text-xs font-bold block mb-2 uppercase tracking-tighter">🎫 至少進入挑戰賽</span>
                <div id="clinchedTop5" class="text-xl font-black text-blue-400 drop-shadow-md">未有隊伍</div>
            </div>
            <div class="p-5 rounded-2xl bg-[#242426] border border-white/5 shadow-xl text-center">
                <span class="text-rose-500/80 text-xs font-bold block mb-2 uppercase tracking-tighter">❌ 無法進入季後賽</span>
                <div id="eliminated" class="text-xl font-black text-rose-400 drop-shadow-md">未有</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- 左側：輕量化賽程表 -->
        <div class="lg:col-span-5 bg-[#242426] p-6 rounded-2xl shadow-sm border border-white/5 flex flex-col max-h-[850px]">
            <div class="flex justify-between items-center mb-6 shrink-0 px-1">
                <h3 class="text-xl font-bold text-white flex items-center">
                    <span class="w-1 h-5 bg-[#d8bf98] mr-3 rounded-full"></span>選擇比賽結果
                </h3>
                <button onclick="resetAll()" class="text-[10px] font-bold bg-white/5 hover:bg-white/10 text-slate-300 px-4 py-1.5 rounded-full transition border border-white/10 uppercase">Reset</button>
            </div>
            <div id="matchList" class="space-y-3 overflow-y-auto custom-scrollbar pr-2 flex-1"></div>
        </div>

        <!-- 右側：戰績排行 -->
        <div class="lg:col-span-7 space-y-6">
            <div class="bg-[#242426] p-6 rounded-2xl shadow-sm border border-white/5 text-slate-200">
                <h3 class="text-xl font-bold mb-6 text-white flex items-center">
                    <span class="w-1 h-5 bg-[#d8bf98] mr-3 rounded-full"></span>目前戰績排名
                </h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-slate-500 text-[11px] uppercase tracking-widest border-b border-white/5">
                                <th class="pb-4 pl-2">排名</th>
                                <th class="pb-4">隊伍</th>
                                <th class="pb-4 text-center">總戰績</th>
                                <th class="pb-4 text-center text-[#d8bf98]">最高勝場</th>
                                <th class="pb-4 text-right pr-2">狀態</th>
                            </tr>
                        </thead>
                        <tbody id="standingsBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-[#242426] p-6 rounded-2xl shadow-sm border border-white/5">
                <h3 class="text-[11px] font-bold text-slate-500 mb-6 uppercase tracking-widest text-center">各隊勝場區間視覺化</h3>
                <div class="h-[320px]">
                    <canvas id="standingsChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const baseTeams = {
        '雲豹':   { win: 19, lose: 9,  color: '#116d4e', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/leopards.BGzlSG8M.webp' },
        '夢想家': { win: 17, lose: 11, color: '#8eb73d', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/dreamers.8uP5AliT.webp' },
        '攻城獅': { win: 14, lose: 12, color: '#52308c', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/lioneers.DTfkuEJZ.webp' },
        '國王':   { win: 15, lose: 13, color: '#ffe91a', textColor: '#000000', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/kings.DsunMN-K.webp' },
        '特攻':   { win: 14, lose: 13, color: '#f6d233', textColor: '#182648', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/dea.BEfNfG39.webp' },
        '戰神':   { win: 9,  lose: 18, color: '#e20202', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/mars.BbDWfkG6.webp' },
        '海神':   { win: 8,  lose: 20, color: '#0766e3', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/aquas.CB-Rq9NB.webp' }
    };

    const initialH2H = {
        '雲豹': { '夢想家': 3, '攻城獅': 2, '國王': 3, '特攻': 4, '戰神': 4, '海神': 3 },
        '夢想家': { '雲豹': 2, '攻城獅': 2, '國王': 1, '特攻': 3, '戰神': 5, '海神': 4 },
        '攻城獅': { '雲豹': 2, '夢想家': 2, '國王': 3, '特攻': 2, '戰神': 1, '海神': 4 },
        '國王': { '雲豹': 2, '夢想家': 3, '攻城獅': 2, '特攻': 1, '戰神': 3, '海神': 4 },
        '特攻': { '雲豹': 1, '夢想家': 2, '攻城獅': 2, '國王': 3, '戰神': 3, '海神': 3 },
        '戰神': { '雲豹': 1, '夢想家': 0, '攻城獅': 3, '國王': 2, '特攻': 1, '海神': 2 },
        '海神': { '雲豹': 1, '夢想家': 1, '攻城獅': 1, '國王': 1, '特攻': 2, '戰神': 2 }
    };

    const matches = [
        { id: 'G97', date: '3/25', teamA: '夢想家', teamB: '海神' },
        { id: 'G98', date: '3/27', teamA: '夢想家', teamB: '國王' },
        { id: 'G99', date: '3/28', teamA: '攻城獅', teamB: '特攻' },
        { id: 'G100', date: '3/28', teamA: '戰神', teamB: '海神' },
        { id: 'G101', date: '3/29', teamA: '攻城獅', teamB: '雲豹' },
        { id: 'G102', date: '3/29', teamA: '戰神', teamB: '國王' },
        { id: 'G103', date: '4/1',  teamA: '特攻', teamB: '戰神' },
        { id: 'G104', date: '4/4',  teamA: '特攻', teamB: '夢想家' },
        { id: 'G105', date: '4/4',  teamA: '雲豹', teamB: '海神' },
        { id: 'G106', date: '4/5',  teamA: '特攻', teamB: '國王' },
        { id: 'G107', date: '4/5',  teamA: '雲豹', teamB: '戰神' },  
        { id: 'G108', date: '4/8',  teamA: '攻城獅', teamB: '特攻' },
        { id: 'G109', date: '4/11', teamA: '海神', teamB: '國王' },
        { id: 'G110', date: '4/11', teamA: '攻城獅', teamB: '雲豹' },
        { id: 'G111', date: '4/12', teamA: '海神', teamB: '戰神' },
        { id: 'G112', date: '4/12', teamA: '攻城獅', teamB: '夢想家' },
        { id: 'G113', date: '4/18', teamA: '夢想家', teamB: '戰神' },
        { id: 'G114', date: '4/18', teamA: '特攻', teamB: '雲豹' },
        { id: 'G115', date: '4/19', teamA: '夢想家', teamB: '攻城獅' },
        { id: 'G116', date: '4/19', teamA: '特攻', teamB: '海神' },
        { id: 'G117', date: '4/24', teamA: '國王', teamB: '夢想家' },
        { id: 'G118', date: '4/25', teamA: '雲豹', teamB: '海神' },
        { id: 'G119', date: '4/25', teamA: '戰神', teamB: '攻城獅' },
        { id: 'G120', date: '4/26', teamA: '雲豹', teamB: '夢想家' },
        { id: 'G121', date: '4/26', teamA: '戰神', teamB: '特攻' },
        { id: 'G122', date: '4/29', teamA: '攻城獅', teamB: '國王' },
        { id: 'G123', date: '5/2',  teamA: '攻城獅', teamB: '戰神' },
        { id: 'G124', date: '5/2',  teamA: '國王', teamB: '雲豹' },
        { id: 'G125', date: '5/3',  teamA: '攻城獅', teamB: '海神' },
        { id: 'G126', date: '5/3',  teamA: '國王', teamB: '特攻' }
    ];

    let matchResults = {};
    let chartInstance = null;

    function init() {
        matches.forEach(m => matchResults[m.id] = null);
        renderMatches();
        calculateAndUpdate();
    }

    function renderMatches() {
        const container = document.getElementById('matchList');
        container.innerHTML = matches.map(m => {
            const res = matchResults[m.id];
            const styleA = getTeamStyle(m.teamA, res === 'teamA');
            const styleB = getTeamStyle(m.teamB, res === 'teamB');

            return `
                <div class="p-3 rounded-xl bg-[#1d1d1f] border border-white/5 shadow-sm">
                    <div class="flex items-center justify-between mb-2 px-1">
                        <span class="text-[10px] font-bold text-slate-200 bg-white/10 px-2 py-0.5 rounded tracking-widest">${m.id} | ${m.date}</span>
                        <span class="text-[9px] text-slate-500 uppercase font-black tracking-tighter">Select Result</span>
                    </div>
                    <div class="flex space-x-2 items-center">
                        <div class="flex-1">
                            <button onclick="setWinner('${m.id}', 'teamB')" 
                                style="${styleB}"
                                class="w-full py-2 px-3 text-sm rounded-lg border transition-all font-bold text-center truncate ${res === 'teamB' ? 'shadow-[0_0_15px_rgba(0,0,0,0.3)]' : 'bg-[#242426] text-slate-300 border-white/5 hover:border-white/10'}">
                                ${m.teamB}
                            </button>
                            <div class="text-[8px] text-center text-slate-600 mt-1 font-black uppercase tracking-widest">Away</div>
                        </div>
                        <div class="text-white/10 font-black text-[9px] italic uppercase">vs</div>
                        <div class="flex-1">
                            <button onclick="setWinner('${m.id}', 'teamA')" 
                                style="${styleA}"
                                class="w-full py-2 px-3 text-sm rounded-lg border transition-all font-bold text-center truncate ${res === 'teamA' ? 'shadow-[0_0_15px_rgba(0,0,0,0.3)]' : 'bg-[#242426] text-slate-300 border-white/5 hover:border-white/10'}">
                                ${m.teamA}
                            </button>
                            <div class="text-[8px] text-center text-slate-600 mt-1 font-black uppercase tracking-widest">Home</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function getTeamStyle(teamName, isSelected) {
        if (!isSelected) return "";
        const team = baseTeams[teamName];
        return `background-color: ${team.color}; color: ${team.textColor}; border-color: ${team.color};`;
    }

    function setWinner(id, winner) {
        matchResults[id] = (matchResults[id] === winner) ? null : winner;
        renderMatches();
        calculateAndUpdate();
    }

    function resetAll() {
        matches.forEach(m => matchResults[m.id] = null);
        renderMatches();
        calculateAndUpdate();
    }

    // --- 核心判定函數 (解決海神淘汰問題的關鍵) ---
    function definitelyBeats(otherTeam, targetTeam, stats, h2h) {
        const otherMin = stats[otherTeam].win;
        const targetMax = stats[targetTeam].maxWins;

        // 1. 保底勝場已經嚴格大於上限
        if (otherMin > targetMax) return true;

        // 2. 勝場相同時，對戰紀錄是否已經鎖定勝出 (總共6場，拿4場即鎖定)
        if (otherMin === targetMax) {
            const h2hWins = h2h[otherTeam][targetTeam] || 0;
            // 如果對戰已經贏 4 場，平手也一定排在前面
            if (h2hWins >= 4) return true;
        }
        return false;
    }

    function calculateAndUpdate() {
        let currentStats = JSON.parse(JSON.stringify(baseTeams));
        let currentH2H = JSON.parse(JSON.stringify(initialH2H));

        matches.forEach(m => {
            const res = matchResults[m.id];
            if (res) {
                const winner = res === 'teamA' ? m.teamA : m.teamB;
                const loser = res === 'teamA' ? m.teamB : m.teamA;
                currentStats[winner].win++;
                currentStats[loser].lose++;
                currentH2H[winner][loser] = (currentH2H[winner][loser] || 0) + 1;
            }
        });

        Object.keys(currentStats).forEach(t => currentStats[t].maxWins = 36 - currentStats[t].lose);

        const teams = Object.keys(currentStats);
        let clinchedTop3 = [], clinchedTop5 = [], eliminated = [];

        teams.forEach(target => {
            let definitelyBetterThanTarget = 0;
            let possiblyBetterThanTarget = 0;

            teams.forEach(other => {
                if (target === other) return;

                // 判定「誰確定贏過我」
                if (definitelyBeats(other, target, currentStats, currentH2H)) {
                    definitelyBetterThanTarget++;
                }

                // 判定「誰有可能排在我前面」(嚴格鎖定判定)
                if (currentStats[other].maxWins >= currentStats[target].win) {
                    possiblyBetterThanTarget++;
                }
            });

            // 淘汰：有 5 隊確定排在你前面 (你就排第 6 或第 7)
            if (definitelyBetterThanTarget >= 5) eliminated.push(target);
            
            // 鎖定：能威脅你的隊伍小於 3 隊/5 隊
            if (possiblyBetterThanTarget < 3) clinchedTop3.push(target);
            else if (possiblyBetterThanTarget < 5) clinchedTop5.push(target);
        });

        document.getElementById('clinchedTop3').innerText = clinchedTop3.length ? clinchedTop3.join(', ') : '尚未鎖定';
        document.getElementById('clinchedTop5').innerText = clinchedTop5.length ? clinchedTop5.join(', ') : '尚未鎖定';
        document.getElementById('eliminated').innerText = eliminated.length ? eliminated.join(', ') : '尚未產生';

        const sorted = teams.sort((a, b) => {
            if (currentStats[a].win !== currentStats[b].win) return currentStats[b].win - currentStats[a].win;
            return (currentH2H[b][a] || 0) - (currentH2H[a][b] || 0);
        });
        renderTable(sorted, currentStats, clinchedTop3, clinchedTop5, eliminated);
        renderChart(sorted, currentStats);
    }

    function renderTable(sorted, stats, top3, top5, elim) {
        const body = document.getElementById('standingsBody');
        body.innerHTML = sorted.map((team, i) => {
            let status = '<span class="text-white/5">-</span>';
            if (top3.includes(team)) status = '<span class="text-emerald-400 font-bold text-[10px] bg-emerald-500/10 border border-emerald-500/30 px-3 py-1 rounded-full tracking-tighter">CLINCHED TOP3</span>';
            else if (top5.includes(team)) status = '<span class="text-blue-400 font-bold text-[10px] bg-blue-500/10 border border-blue-500/30 px-3 py-1 rounded-full tracking-tighter">CLINCHED TOP5</span>';
            else if (elim.includes(team)) status = '<span class="text-rose-400 font-bold text-[10px] bg-rose-500/10 border border-rose-500/30 px-3 py-1 rounded-full tracking-tighter uppercase font-black">Eliminated</span>';

            return `
                <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors group">
                    <td class="py-5 pl-2 font-mono font-bold text-slate-500 group-hover:text-slate-300">#0${i+1}</td>
                    <td class="py-5 flex items-center">
                        <div class="relative w-10 h-10 mr-4 bg-[#19191a] rounded-xl p-1.5 border border-white/10 shadow-inner">
                            <img src="${baseTeams[team].logo}" class="w-full h-full object-contain">
                        </div>
                        <span class="font-bold text-slate-100 text-base tracking-tight">${team}</span>
                    </td>
                    <td class="py-5 text-center text-sm font-semibold text-slate-400">${stats[team].win}W - ${stats[team].lose}L</td>
                    <td class="py-5 text-center font-black text-[#d8bf98] text-xl tabular-nums">${stats[team].maxWins}</td>
                    <td class="py-5 text-right pr-2">${status}</td>
                </tr>
            `;
        }).join('');
    }

    function renderChart(sorted, stats) {
        const ctx = document.getElementById('standingsChart').getContext('2d');
        const data = {
            labels: sorted,
            datasets: [
                { label: '目前勝場', data: sorted.map(t => stats[t].win), backgroundColor: sorted.map(t => baseTeams[t].color), borderRadius: 6 },
                { label: '潛在勝場', data: sorted.map(t => stats[t].maxWins - stats[t].win), backgroundColor: 'rgba(255, 255, 255, 0.05)', borderRadius: 6 }
            ]
        };
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: data,
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    x: { stacked: true, max: 36, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#475569', font: { size: 10 } } }, 
                    y: { stacked: true, grid: { display: false }, ticks: { color: '#cbd5e1', font: { weight: 'bold', size: 13 } } } 
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = init;
</script>
</body>
</html>
