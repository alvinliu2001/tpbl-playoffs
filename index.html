<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://tpbl.basketball/favicon.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/alvinliu2001/tpbl-tool/refs/heads/main/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPBL 季後賽晉級預測</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        .match-btn { transition: all 0.2s; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .tooltip-content { transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
        .group:hover .tooltip-content { opacity: 1; transform: translateY(0); }
        @media (min-width: 1024px) { .desktop-container { height: calc(100vh - 4rem); position: sticky; top: 2rem; } }
        @media (max-width: 1023px) { .mobile-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; } .mobile-slider::-webkit-scrollbar { display: none; } .slide-item { flex: 0 0 100%; scroll-snap-align: center; padding: 0 4px; } }
    </style>
</head>
<body class="bg-[#19191a] text-slate-200 p-3 md:p-8">

<div class="max-w-7xl mx-auto">
    <header class="mb-8 md:mb-10 text-center">
        <h1 class="text-2xl md:text-4xl font-extrabold mb-3 tracking-tight">
            <span class="text-[#ffffff]">TPBL 季後賽</span><span class="text-[#d8bf98]">晉級預測工具</span>
        </h1>
        <p class="text-slate-500 font-medium tracking-widest text-xs md:sm uppercase">TPBL Playoff Predictor</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4 mt-8">
            <div class="p-4 md:p-5 rounded-2xl bg-[#242426] border border-white/5 shadow-xl text-center">
                <span class="text-emerald-500/80 text-[10px] md:text-xs font-bold block mb-2 uppercase tracking-tighter">🏆 確定進入季後賽</span>
                <div id="clinchedTop3" class="text-lg md:text-xl font-black text-emerald-400 drop-shadow-md">未有隊伍</div>
            </div>
            <div class="p-4 md:p-5 rounded-2xl bg-[#242426] border border-white/5 shadow-xl text-center">
                <span class="text-blue-500/80 text-[10px] md:text-xs font-bold block mb-2 uppercase tracking-tighter">🎫 至少進入挑戰賽</span>
                <div id="clinchedTop5" class="text-lg md:text-xl font-black text-blue-400 drop-shadow-md">未有隊伍</div>
            </div>
            <div class="p-4 md:p-5 rounded-2xl bg-[#242426] border border-white/5 shadow-xl text-center text-rose-400">
                <span class="text-rose-500/80 text-[10px] md:text-xs font-bold block mb-2 uppercase tracking-tighter">❌ 無法進入季後賽</span>
                <div id="eliminated" class="text-lg md:text-xl font-black drop-shadow-md">未有隊伍</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8 items-start">
        <div class="lg:col-span-5 desktop-container">
            <div class="bg-[#242426] p-4 md:p-6 rounded-2xl shadow-sm border border-white/5 flex flex-col h-full">
                <div class="flex justify-between items-center mb-5 shrink-0 px-1">
                    <h3 class="text-lg md:text-xl font-bold text-white flex items-center">
                        <span class="w-1 h-5 bg-[#d8bf98] mr-3 rounded-full"></span>預測比賽結果
                    </h3>
                    <div class="flex items-center space-x-3">
                        <span class="lg:hidden text-[10px] text-[#d8bf98]/50 font-bold uppercase tracking-widest animate-pulse">Swipe ↔</span>
                        <button onclick="resetAll()" class="text-[10px] font-bold bg-white/5 hover:bg-white/10 text-slate-300 px-3 py-1.5 rounded-full transition border border-white/10 uppercase">Reset</button>
                    </div>
                </div>
                <div id="matchList" class="mobile-slider lg:flex-col lg:overflow-y-auto custom-scrollbar flex-1 lg:space-y-3 pb-2 md:pb-0"></div>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div class="bg-[#242426] p-4 md:p-6 rounded-2xl shadow-sm border border-white/5 text-slate-200">
                <h3 class="text-lg md:text-xl font-bold mb-5 text-white flex items-center">
                    <span class="w-1 h-5 bg-[#d8bf98] mr-3 rounded-full"></span>模擬戰績排名
                </h3>
                <div class="overflow-visible px-1"> 
                    <table class="w-full text-left border-collapse table-fixed">
                        <thead>
                            <tr class="text-slate-500 text-[9px] md:text-[11px] uppercase tracking-widest border-b border-white/5">
                                <th class="pb-3 pl-1 w-[10%]">#</th>
                                <th class="pb-3 w-[25%]">隊伍</th>
                                <th class="pb-3 text-center w-[18%] relative group cursor-help">
                                    <span class="border-b border-dotted border-slate-600">現時戰績</span>
                                    <div class="tooltip-content absolute z-20 invisible group-hover:visible opacity-0 -translate-y-1 w-32 md:w-40 p-2 mt-2 text-[10px] leading-relaxed text-slate-200 bg-[#1d1d1f] border border-[#d8bf98]/30 rounded-lg shadow-2xl left-1/2 -translate-x-1/2 normal-case tracking-normal font-medium">包含目前已點選的預測賽果。</div>
                                </th>
                                <th class="pb-3 text-center text-[#d8bf98] w-[15%] relative group cursor-help">
                                    <span class="border-b border-dotted border-[#d8bf98]/50">最高勝場</span>
                                    <div class="tooltip-content absolute z-20 invisible group-hover:visible opacity-0 -translate-y-1 w-32 md:w-40 p-2 mt-2 text-[10px] leading-relaxed text-slate-200 bg-[#1d1d1f] border border-[#d8bf98]/30 rounded-lg shadow-2xl left-1/2 -translate-x-1/2 normal-case tracking-normal font-medium">若剩餘賽事全勝，最終能達到的總勝場。</div>
                                </th>
                                <th class="pb-3 text-center w-[15%] relative group cursor-help">
                                    <span class="border-b border-dotted border-slate-600">晉級場數</span>
                                    <div class="tooltip-content absolute z-20 invisible group-hover:visible opacity-0 -translate-y-1 w-32 md:w-40 p-2 mt-2 text-[10px] leading-relaxed text-slate-200 bg-[#1d1d1f] border border-[#d8bf98]/30 rounded-lg shadow-2xl left-1/2 -translate-x-1/2 normal-case tracking-normal font-medium">在理想劇本下，預計還需幾場聯賽即可鎖定前三。</div>
                                </th>
                                <th class="pb-3 text-right pr-1 w-[17%]">狀態</th>
                            </tr>
                        </thead>
                        <tbody id="standingsBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="pathAnalysisSection" class="bg-[#242426] p-4 md:p-6 rounded-2xl shadow-sm border border-white/5 hidden">
                <h3 class="text-lg md:text-xl font-bold mb-5 text-white flex items-center justify-between">
                    <div class="flex items-center"><span class="w-1 h-5 bg-[#d8bf98] mr-3 rounded-full"></span>最短晉級路徑分析</div>
                    <div id="pathTeamName" class="text-[10px] md:text-sm font-bold text-[#d8bf98] bg-[#d8bf98]/10 px-3 py-1 rounded-full border border-[#d8bf98]/20"></div>
                </h3>
                <div id="pathList" class="grid grid-cols-1 md:grid-cols-2 gap-2 md:gap-3 text-sm"></div>
                <div class="mt-4 p-3 md:p-4 bg-white/[0.02] rounded-xl border border-white/5 text-[9px] md:text-[10px] text-slate-500 leading-relaxed font-medium text-center">
                    * 註：此路徑為系統推論之「理想劇本」。點擊場次可自動同步至預測區。
                </div>
            </div>

            <div class="bg-[#242426] p-4 md:p-6 rounded-2xl shadow-sm border border-white/5">
                <h3 class="text-[11px] font-bold text-slate-500 mb-6 uppercase tracking-widest text-center">各隊勝場區間視覺化</h3>
                <div class="h-[280px] md:h-[320px]"><canvas id="standingsChart"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script>
    const baseTeams = {
        '雲豹':   { win: 19, lose: 9,  color: '#116d4e', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/leopards.BGzlSG8M.webp' },
        '夢想家': { win: 17, lose: 11, color: '#8eb73d', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/dreamers.8uP5AliT.webp' },
        '攻城獅': { win: 14, lose: 12, color: '#52308c', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/lioneers.DTfkuEJZ.webp' },
        '國王':   { win: 15, lose: 13, color: '#ffe91a', textColor: '#000000', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/kings.DsunMN-K.webp' },
        '特攻':   { win: 14, lose: 13, color: '#f6d233', textColor: '#182648', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/dea.BEfNfG39.webp' },
        '戰神':   { win: 9,  lose: 18, color: '#e20202', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/mars.BbDWfkG6.webp' },
        '海神':   { win: 8,  lose: 20, color: '#0766e3', textColor: '#ffffff', logo: 'https://assets.tpbl.basketball/frontend/_nuxt/aquas.CB-Rq9NB.webp' }
    };

    const initialH2H = {
        '雲豹': { '夢想家': 3, '攻城獅': 2, '國王': 3, '特攻': 4, '戰神': 4, '海神': 3 },
        '夢想家': { '雲豹': 2, '攻城獅': 2, '國王': 1, '特攻': 3, '戰神': 5, '海神': 4 },
        '攻城獅': { '雲豹': 2, '夢想家': 2, '國王': 3, '特攻': 2, '戰神': 1, '海神': 4 },
        '國王': { '雲豹': 2, '夢想家': 3, '攻城獅': 2, '特攻': 1, '戰神': 3, '海神': 4 },
        '特攻': { '雲豹': 1, '夢想家': 2, '攻城獅': 2, '國王': 3, '戰神': 3, '海神': 3 },
        '戰神': { '雲豹': 1, '夢想家': 0, '攻城獅': 3, '國王': 2, '特攻': 1, '海神': 2 },
        '海神': { '雲豹': 1, '夢想家': 1, '攻城獅': 1, '國王': 1, '特攻': 2, '戰神': 2 }
    };

    const matches = [
        { id: 'G97', date: '3/25', teamA: '夢想家', teamB: '海神' }, { id: 'G98', date: '3/27', teamA: '夢想家', teamB: '國王' }, { id: 'G99', date: '3/28', teamA: '攻城獅', teamB: '特攻' }, { id: 'G100', date: '3/28', teamA: '戰神', teamB: '海神' }, { id: 'G101', date: '3/29', teamA: '攻城獅', teamB: '雲豹' }, { id: 'G102', date: '3/29', teamA: '戰神', teamB: '國王' }, { id: 'G103', date: '4/1',  teamA: '特攻', teamB: '戰神' }, { id: 'G104', date: '4/4',  teamA: '特攻', teamB: '夢想家' }, { id: 'G105', date: '4/4',  teamA: '雲豹', teamB: '海神' }, { id: 'G106', date: '4/5',  teamA: '特攻', teamB: '國王' }, { id: 'G107', date: '4/5',  teamA: '雲豹', teamB: '戰神' }, { id: 'G108', date: '4/8',  teamA: '攻城獅', teamB: '特攻' }, { id: 'G109', date: '4/11', teamA: '海神', teamB: '國王' }, { id: 'G110', date: '4/11', teamA: '攻城獅', teamB: '雲豹' }, { id: 'G111', date: '4/12', teamA: '海神', teamB: '戰神' }, { id: 'G112', date: '4/12', teamA: '攻城獅', teamB: '夢想家' }, { id: 'G113', date: '4/18', teamA: '夢想家', teamB: '戰神' }, { id: 'G114', date: '4/18', teamA: '特攻', teamB: '雲豹' }, { id: 'G115', date: '4/19', teamA: '夢想家', teamB: '攻城獅' }, { id: 'G116', date: '4/19', teamA: '特攻', teamB: '海神' }, { id: 'G117', date: '4/24', teamA: '國王', teamB: '夢想家' }, { id: 'G118', date: '4/25', teamA: '雲豹', teamB: '海神' }, { id: 'G119', date: '4/25', teamA: '戰神', teamB: '攻城獅' }, { id: 'G120', date: '4/26', teamA: '雲豹', teamB: '夢想家' }, { id: 'G121', date: '4/26', teamA: '戰神', teamB: '特攻' }, { id: 'G122', date: '4/29', teamA: '攻城獅', teamB: '國王' }, { id: 'G123', date: '5/2',  teamA: '攻城獅', teamB: '戰神' }, { id: 'G124', date: '5/2',  teamA: '國王', teamB: '雲豹' }, { id: 'G125', date: '5/3',  teamA: '攻城獅', teamB: '海神' }, { id: 'G126', date: '5/3',  teamA: '國王', teamB: '特攻' }
    ];

    let matchResults = {}, chartInstance = null, selectedPathTeam = '雲豹';

    function init() { matches.forEach(m => matchResults[m.id] = null); renderMatches(); calculateAndUpdate(); }

    function applyPathMatch(id, winner) { if (winner === 'none') return; matchResults[id] = winner; renderMatches(); calculateAndUpdate(); }

    function renderMatches() {
        const container = document.getElementById('matchList');
        container.innerHTML = matches.map(m => {
            const res = matchResults[m.id];
            const styleA = getTeamStyle(m.teamA, res === 'teamA');
            const styleB = getTeamStyle(m.teamB, res === 'teamB');
            return `<div class="slide-item"><div class="p-4 rounded-xl bg-[#1d1d1f] border border-white/5 shadow-sm h-full flex flex-col justify-center"><div class="flex items-center justify-between mb-4 px-1"><span class="text-[10px] font-bold text-slate-200 bg-white/10 px-2 py-0.5 rounded tracking-widest">${m.id} | ${m.date}</span><span class="text-[9px] text-slate-500 uppercase font-black tracking-tighter">Select Result</span></div><div class="flex space-x-2 items-center"><div class="flex-1"><button onclick="setWinner('${m.id}', 'teamB')" style="${styleB}" class="w-full py-3 px-2 text-[13px] md:text-sm rounded-lg border transition-all font-bold text-center truncate ${res === 'teamB' ? 'shadow-[0_0_15px_rgba(0,0,0,0.3)]' : 'bg-[#242426] text-slate-300 border-white/5 hover:border-white/10'}">${m.teamB}</button><div class="text-[8px] text-center text-slate-600 mt-1 font-black uppercase tracking-widest">Away</div></div><div class="text-white/10 font-black text-[9px] italic uppercase px-1">vs</div><div class="flex-1"><button onclick="setWinner('${m.id}', 'teamA')" style="${styleA}" class="w-full py-3 px-2 text-[13px] md:text-sm rounded-lg border transition-all font-bold text-center truncate ${res === 'teamA' ? 'shadow-[0_0_15px_rgba(0,0,0,0.3)]' : 'bg-[#242426] text-slate-300 border-white/5 hover:border-white/10'}">${m.teamA}</button><div class="text-[8px] text-center text-slate-600 mt-1 font-black uppercase tracking-widest">Home</div></div></div></div></div>`;
        }).join('');
    }

    function getTeamStyle(name, sel) { const t = baseTeams[name]; return sel ? `background-color: ${t.color}; color: ${t.textColor}; border-color: ${t.color};` : ""; }
    function selectPathTeam(name) { selectedPathTeam = name; calculateAndUpdate(); }
    function setWinner(id, winner) { matchResults[id] = (matchResults[id] === winner) ? null : winner; renderMatches(); calculateAndUpdate(); }
    function resetAll() { matches.forEach(m => matchResults[m.id] = null); renderMatches(); calculateAndUpdate(); }

    function definitelyBeats(other, target, stats, h2h) {
        const oMin = stats[other].win, tMax = stats[target].maxWins;
        if (oMin > tMax) return true;
        if (oMin === tMax && (h2h[other][target] || 0) >= 4) return true;
        return false;
    }

    // 核心優化：更強大的路徑模擬大腦
    function getQuickestClinch(targetTeam, currentStats, currentH2H) {
        const simulateToEnd = (startIdx, stats, h2h, results) => {
            let s = JSON.parse(JSON.stringify(stats)), h = JSON.parse(JSON.stringify(h2h)), res = JSON.parse(JSON.stringify(results));
            const check = (st, hh) => {
                let risk = 0;
                Object.keys(st).forEach(o => { if (o !== targetTeam && (st[o].maxWins > st[targetTeam].win || (st[o].maxWins === st[targetTeam].win && (hh[targetTeam][o] || 0) < 4))) risk++; });
                return risk < 3;
            };
            if (check(s, h)) return { days: 0, path: [] };
            let count = 0, p = [];
            for (let i = 0; i < matches.length; i++) {
                const m = matches[i]; if (res[m.id] !== null) continue;
                count++;
                let win, los, key, irr = false;
                if (m.teamA === targetTeam || m.teamB === targetTeam) { key = (m.teamA === targetTeam) ? 'teamA' : 'teamB'; win = targetTeam; los = (m.teamA === targetTeam) ? m.teamB : m.teamA; }
                else {
                    let sA = JSON.parse(JSON.stringify(s)), sB = JSON.parse(JSON.stringify(s));
                    sA[m.teamA].win++; sA[m.teamB].lose++; sA[m.teamA].maxWins = 36-sA[m.teamA].lose; sA[m.teamB].maxWins = 36-sA[m.teamB].lose;
                    sB[m.teamB].win++; sB[m.teamA].lose++; sB[m.teamB].maxWins = 36-sB[m.teamB].lose; sB[m.teamA].maxWins = 36-sB[m.teamA].lose;
                    const getC = (st) => { const comp = Object.keys(st).filter(t=>t!==targetTeam).sort((a,b)=>st[b].maxWins - st[a].maxWins); return st[comp[2]].maxWins; };
                    if (getC(sA) < getC(sB)) { key = 'teamA'; win = m.teamA; los = m.teamB; } else { key = 'teamB'; win = m.teamB; los = m.teamA; }
                }
                s[win].win++; s[los].lose++; h[win][los] = (h[win][los] || 0) + 1; s[win].maxWins = 36-s[win].lose; s[los].maxWins = 36-s[los].lose;
                let txt = (win === targetTeam) ? `<span class="text-[#d8bf98] font-bold">${targetTeam}</span> 獲勝` : `${los} 輸給 ${win}`;
                p.push({ id: m.id, date: m.date, detail: txt, winnerKey: key });
                if (check(s, h)) return { days: count, path: p };
            }
            return { days: 'X', path: [] };
        };

        const baseResult = simulateToEnd(0, currentStats, currentH2H, matchResults);
        if (baseResult.days === 0 || baseResult.days === 'X') return baseResult;

        // 為了解決不影響的翻轉問題，重新掃描路徑標註不影響
        let finalPath = [];
        let tempStats = JSON.parse(JSON.stringify(currentStats)), tempH2H = JSON.parse(JSON.stringify(currentH2H)), tempRes = JSON.parse(JSON.stringify(matchResults));
        
        for (let entry of baseResult.path) {
            const m = matches.find(x => x.id === entry.id);
            if (m.teamA !== targetTeam && m.teamB !== targetTeam) {
                let resA = JSON.parse(JSON.stringify(tempRes)); resA[m.id] = 'teamA';
                let resB = JSON.parse(JSON.stringify(tempRes)); resB[m.id] = 'teamB';
                // 判斷兩邊未來最短路徑是否天數一致
                if (simulateToEnd(0, tempStats, tempH2H, resA).days === simulateToEnd(0, tempStats, tempH2H, resB).days) {
                    entry.detail = `<span class="text-slate-500 italic">不會影響</span>`;
                    entry.winnerKey = 'none';
                }
            }
            // 更新狀態繼續往下測
            let w = entry.winnerKey === 'teamB' ? m.teamB : m.teamA;
            let l = entry.winnerKey === 'teamB' ? m.teamA : m.teamB;
            if (entry.winnerKey !== 'none') {
                tempStats[w].win++; tempStats[l].lose++; tempH2H[w][l]++;
                tempStats[w].maxWins = 36-tempStats[w].lose; tempStats[l].maxWins = 36-tempStats[l].lose;
                tempRes[m.id] = entry.winnerKey;
            }
            finalPath.push(entry);
        }
        return { days: baseResult.days, path: finalPath };
    }

    function renderClinchPath(teamName, clinchData) {
        const section = document.getElementById('pathAnalysisSection'), list = document.getElementById('pathList'), nameLabel = document.getElementById('pathTeamName');
        section.classList.remove('hidden'); nameLabel.innerText = `${teamName} 最短晉級路徑`;
        if (clinchData.days === 0) { list.innerHTML = `<div class="col-span-full py-8 text-center bg-white/5 rounded-2xl border border-white/5"><div class="text-[#d8bf98] font-bold text-sm">已達成晉級條件</div></div>`; return; }
        if (clinchData.days === 'X') { list.innerHTML = `<div class="col-span-full py-8 text-center bg-white/5 rounded-2xl border border-white/5"><div class="text-slate-400 font-bold text-sm">無直接晉級路徑</div></div>`; return; }
        list.innerHTML = clinchData.path.map(item => `<div onclick="applyPathMatch('${item.id}', '${item.winnerKey}')" class="flex items-center p-3 bg-white/5 rounded-xl border border-white/5 hover:bg-white/10 hover:border-[#d8bf98]/30 transition-all group ${item.winnerKey !== 'none' ? 'cursor-pointer' : 'cursor-default opacity-80'}"><div class="mr-3 text-[9px] font-mono text-slate-500 leading-tight">${item.date}<br/><span class="text-slate-400 font-bold group-hover:text-[#d8bf98]">${item.id}</span></div><div class="text-slate-200 font-medium text-[11px] md:text-xs">${item.detail}</div>${item.winnerKey !== 'none' ? `<div class="ml-auto text-[#d8bf98]/40 group-hover:text-[#d8bf98] text-[10px]">⊕</div>` : ''}</div>`).join('');
    }

    function calculateAndUpdate() {
        let currentStats = JSON.parse(JSON.stringify(baseTeams)), currentH2H = JSON.parse(JSON.stringify(initialH2H));
        matches.forEach(m => { const res = matchResults[m.id]; if (res) { const win = res === 'teamA' ? m.teamA : m.teamB, los = res === 'teamA' ? m.teamB : m.teamA; currentStats[win].win++; currentStats[los].lose++; currentH2H[win][los]++; } });
        Object.keys(currentStats).forEach(t => currentStats[t].maxWins = 36 - currentStats[t].lose);
        const teams = Object.keys(currentStats);
        let top3 = [], top5 = [], elimList = [], clinchInfo = {};
        teams.forEach(target => {
            let defBetter = 0, possBetter = 0;
            teams.forEach(other => { if (target === other) return; if (definitelyBeats(other, target, currentStats, currentH2H)) defBetter++; if (currentStats[other].maxWins > currentStats[target].win || (currentStats[other].maxWins === currentStats[target].win && (currentH2H[target][other] || 0) < 4)) possBetter++; });
            if (defBetter >= 5) elimList.push(target); if (possBetter < 3) top3.push(target); else if (possBetter < 5) top5.push(target);
            clinchInfo[target] = getQuickestClinch(target, currentStats, currentH2H);
        });
        document.getElementById('clinchedTop3').innerText = top3.length ? top3.join(', ') : '未有隊伍';
        document.getElementById('clinchedTop5').innerText = top5.length ? top5.join(', ') : '未有隊伍';
        document.getElementById('eliminated').innerText = elimList.length ? elimList.join(', ') : '未有隊伍';
        const sorted = teams.sort((a, b) => { const sA = currentStats[a], sB = currentStats[b]; const pctA = (sA.win + sA.lose) > 0 ? sA.win / (sA.win + sA.lose) : 0; const pctB = (sB.win + sB.lose) > 0 ? sB.win / (sB.win + sB.lose) : 0; if (Math.abs(pctA - pctB) > 0.0001) return pctB - pctA; return (currentH2H[b][a] || 0) - (currentH2H[a][b] || 0); });
        renderTable(sorted, currentStats, top3, top5, elimList, clinchInfo);
        renderChart(sorted, currentStats); renderClinchPath(selectedPathTeam, clinchInfo[selectedPathTeam]);
    }

    function renderTable(sorted, stats, top3, top5, elim, clinchInfo) {
        const body = document.getElementById('standingsBody');
        body.innerHTML = sorted.map((team, i) => {
            let status = '<span class="text-white/5">-</span>';
            if (top3.includes(team)) status = '<span class="text-emerald-400 font-bold text-[7px] md:text-[10px] bg-emerald-500/10 border border-emerald-500/30 px-1 md:px-3 py-1 rounded-full tracking-tighter">PLAYOFFS</span>';
            else if (top5.includes(team)) status = '<span class="text-blue-400 font-bold text-[7px] md:text-[10px] bg-blue-500/10 border border-blue-500/30 px-1 md:px-3 py-1 rounded-full tracking-tighter">PLAY-IN</span>';
            else if (elim.includes(team)) status = '<span class="text-rose-400 font-bold text-[7px] md:text-[10px] bg-rose-500/10 border border-rose-500/30 px-1 md:px-3 py-1 rounded-full tracking-tighter uppercase font-black">ELIM</span>';
            const cDay = clinchInfo[team].days, cDisp = (cDay === 0) ? '達成' : (cDay === 'X' ? '⨉' : cDay), isSel = team === selectedPathTeam;
            return `<tr onclick="selectPathTeam('${team}')" class="border-b border-white/5 hover:bg-white/[0.05] transition-all cursor-pointer group ${isSel ? 'bg-white/[0.03] ring-1 ring-inset ring-[#d8bf98]/30' : ''}"><td class="py-4 pl-1 font-mono font-bold ${isSel ? 'text-[#d8bf98]' : 'text-slate-500'} text-[10px] md:text-sm">#0${i+1}</td><td class="py-4"><div class="flex items-center whitespace-nowrap"><div class="relative w-5 h-5 md:w-9 md:h-9 mr-1.5 md:mr-4 bg-[#19191a] rounded-md p-0.5 border border-white/10"><img src="${baseTeams[team].logo}" class="w-full h-full object-contain"></div><span class="font-bold ${isSel ? 'text-white' : 'text-slate-100'} text-[12px] md:text-base tracking-tighter">${team}</span></div></td><td class="py-4 text-center text-[10px] md:text-sm font-semibold text-slate-400">${stats[team].win}-${stats[team].lose}</td><td class="py-4 text-center font-black text-[#d8bf98] text-[12px] md:text-xl tabular-nums">${stats[team].maxWins}</td><td class="py-4 text-center font-bold ${isSel ? 'text-[#d8bf98]' : 'text-slate-400'} text-[11px] md:text-base">${cDisp}</td><td class="py-4 text-right pr-1">${status}</td></tr>`;
        }).join('');
    }

    function renderChart(sorted, stats) {
        const ctx = document.getElementById('standingsChart').getContext('2d');
        const data = { labels: sorted, datasets: [{ label: '目前勝場', data: sorted.map(t => stats[t].win), backgroundColor: sorted.map(t => baseTeams[t].color), borderRadius: 6 }, { label: '潛在勝場', data: sorted.map(t => stats[t].maxWins - stats[t].win), backgroundColor: 'rgba(255, 255, 255, 0.05)', borderRadius: 6 }] };
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, { type: 'bar', data: data, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true, max: 36, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#475569', font: { size: 9 } } }, y: { stacked: true, grid: { display: false }, ticks: { color: '#cbd5e1', font: { weight: 'bold', size: 11 } } } }, plugins: { legend: { display: false } } } });
    }

    window.onload = init;
</script>
</body>
</html>
